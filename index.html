<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Jane Doe Build"/>
<meta name="theme-color" content="#0f0d0b"/>
<title>Jane Doe Build</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body,#root{height:100%;background:#0f0d0b;}
body{overscroll-behavior:none;}
input,select,textarea{-webkit-appearance:none;appearance:none;}
main{-webkit-overflow-scrolling:touch;}

/* Desktop: sidebar visible, no bottom nav */
@media(min-width:701px){
  .jdb-bottom-nav{display:none!important;}
  .jdb-main-pad{padding:28px 28px 60px;}
}
/* Mobile: hide sidebar, show bottom nav */
@media(max-width:700px){
  .jdb-sidebar{display:none!important;}
  .jdb-bottom-nav{display:flex!important;}
  .jdb-main-pad{padding:14px 12px 90px!important;}
}

.jdb-bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:#161310;
  border-top:1px solid #2e2820;
  justify-content:space-around;
  padding:8px 0;
  padding-bottom:max(10px,env(safe-area-inset-bottom));
  z-index:1000;
}
</style>
</head>
<body>
<div id="root"><div style="background:#0f0d0b;height:100vh;display:flex;align-items:center;justify-content:center;color:#c8774a;font-family:system-ui;font-size:18px">Loading Jane Doe Build...</div></div>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Jane Doe Build"/>
<meta name="theme-color" content="#0a0806"/>
<title>Jane Doe Build</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body,#root{height:100%;background:#0a0806;}
body{overscroll-behavior:none;}
input,select,textarea{-webkit-appearance:none;appearance:none;}

/* ── iPhone safe areas ─────────────────────────────────────────────── */
/* Top: camera island / Dynamic Island on iPhone 14 Pro+ */
:root {
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
}

/* Push body content below the notch/island */
body {
  padding-top: var(--sat);
  /* Bottom handled per-element so nav bar sits flush */
}

/* The sticky top bar inside main needs extra top push when body already has sat */
/* We override inline via the jdb-topbar class */
.jdb-topbar {
  padding-top: max(12px, var(--sat)) !important;
  height: auto !important;
  min-height: 56px;
}

/* Bottom nav: extra padding for home indicator */
.jdb-bottom-nav-safe {
  padding-bottom: max(12px, var(--sab)) !important;
}

/* Main scroll area: leave room for bottom nav + home indicator */
.jdb-scroll-pad {
  padding-bottom: calc(70px + var(--sab)) !important;
}
</style>
</head>

<div id="root"><div style="background:#0a0806;height:100vh;display:flex;align-items:center;justify-content:center;color:#d4824e;font-family:system-ui;font-size:18px">Loading Jane Doe Build...</div></div>

    {src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%230a0806' rx='80'/%3E%3Ctext x='256' y='360' font-size='280' text-anchor='middle' fill='%23d4824e' font-family='Georgia,serif'%3EJ%3C/text%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml"}

<script>
// After React renders, add safe-area classes to key elements
function applyIphoneSafeAreas() {
  // Top bar: the sticky header inside main
  const topBars = document.querySelectorAll('main > div[style*="sticky"]');
  topBars.forEach(el => el.classList.add('jdb-topbar'));

  // Bottom nav
  const bottomNavs = document.querySelectorAll('nav[style*="position:fixed"][style*="bottom:0"], nav[style*="position: fixed"][style*="bottom: 0"]');
  bottomNavs.forEach(el => el.classList.add('jdb-bottom-nav-safe'));

  // Main scroll container inner padding
  const scrollPads = document.querySelectorAll('main > div > div[style*="padding"]');
  scrollPads.forEach(el => el.classList.add('jdb-scroll-pad'));
}

// Run after first render and on any re-render (MutationObserver)
const _obs = new MutationObserver(() => applyIphoneSafeAreas());
document.addEventListener('DOMContentLoaded', () => {
  _obs.observe(document.getElementById('root'), {childList:true, subtree:true});
  setTimeout(applyIphoneSafeAreas, 300);
  setTimeout(applyIphoneSafeAreas, 800);
});
</script>
